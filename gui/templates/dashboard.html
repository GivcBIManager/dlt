{% extends "base.html" %}
{% block content %}
<div class="page-head">
  <h1><i class="fa-solid fa-gauge-high"></i> Dashboard</h1>
  <p>Workspace health from the Postgres <span class="mono">etl_meta</span> metastore and branches.</p>
</div>

<div class="metrics-grid" id="cards"></div>

<div style="margin-top:18px">
  <div class="panel">
    <div class="panel-head">
      <h2><i class="fa-solid fa-table-cells"></i> Per-table / branch state</h2>
      <a class="btn sm ghost" href="/logs">Open monitor <i class="fa-solid fa-arrow-right"></i></a>
    </div>
    <div class="filter-bar">
      <div><label>Table</label><select id="f-table"><option value="">All tables</option></select></div>
      <div><label>Branch</label><select id="f-branch"><option value="">All branches</option></select></div>
      <div><label>Status</label><select id="f-status"><option value="">All statuses</option></select></div>
      <button class="btn ghost sm" id="f-clear" style="align-self:flex-end">Clear</button>
      <span class="spacer"></span>
      <span class="muted" id="f-count"></span>
    </div>
    <div class="table-wrap">
      <table id="control">
        <thead><tr>
          <th>Table</th><th>Branch</th><th>Status</th><th class="num">Rows</th>
          <th class="num">Duration</th><th>Last CDC</th><th>Last run</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
let CTRL_ROWS = [];

async function load() {
  try {
    const o = await apiGet("/api/overview");
    const c = o.control;
    const statusBits = Object.entries(c.statuses || {})
      .map(([k, v]) => `${pill(k)} ${v}`).join(" ");
    el("cards").innerHTML = `
      ${metric("Tables", c.tables, "blue", "fa-table-list")}
      ${metric("Branches", c.branches, "teal", "fa-code-branch")}
      ${metric("Table × branch units", c.units, "purple", "fa-layer-group")}
      ${metric("Rows tracked", fmtNum(c.total_rows), "green", "fa-database")}
      ${metric("Active runs", o.active_runs, "amber", "fa-bolt")}
      ${metric("Status", statusBits || "—", "red", "fa-heart-pulse", true)}
      ${metric("Last run", fmtDate(c.last_run_at), "blue", "fa-clock-rotate-left", true)}
    `;

    const ctrl = await apiGet("/api/control");
    CTRL_ROWS = ctrl.rows;
    fillFilter("f-table", [...new Set(CTRL_ROWS.map(r => r.table))]);
    fillFilter("f-branch", [...new Set(CTRL_ROWS.map(r => String(r.branch)))]);
    fillFilter("f-status", [...new Set(CTRL_ROWS.map(r => r.status || "UNKNOWN"))]);
    renderControl();
  } catch (e) { err(e.message); }
}

function fillFilter(id, values) {
  const sel = el(id), keep = sel.value;
  sel.length = 1;  // keep the "All …" option
  values.filter(v => v != null && v !== "").sort().forEach(v =>
    sel.insertAdjacentHTML("beforeend", `<option value="${esc(v)}">${esc(v)}</option>`));
  sel.value = keep;
}

function renderControl() {
  const ft = el("f-table").value, fb = el("f-branch").value, fs = el("f-status").value;
  const rows = CTRL_ROWS.filter(r =>
    (!ft || r.table === ft) &&
    (!fb || String(r.branch) === fb) &&
    (!fs || (r.status || "UNKNOWN") === fs));
  $("#control tbody").innerHTML = rows.map(r => `
    <tr>
      <td class="mono">${esc(r.table)}</td>
      <td>${esc(r.branch)}</td>
      <td>${pill(r.status)}</td>
      <td class="num">${fmtNum(r.row_count)}</td>
      <td class="num">${r.duration_ms != null ? fmtNum(r.duration_ms)+" ms" : "—"}</td>
      <td class="mono">${esc(r.last_cdc || "—")}</td>
      <td class="mono">${fmtDate(r.last_run_at)}</td>
    </tr>`).join("") || `<tr><td colspan="7" class="muted">No matching rows.</td></tr>`;
  el("f-count").textContent = `${rows.length} of ${CTRL_ROWS.length} rows`;
}

function metric(label, value, color, icon, small) {
  return `<div class="metric-card ${color}">
    <div class="icon"><i class="fa-solid ${icon}"></i></div>
    <div class="content">
      <div class="label">${esc(label)}</div>
      <div class="value ${small ? "sm" : ""}">${value}</div>
    </div></div>`;
}

["f-table","f-branch","f-status"].forEach(id => el(id).onchange = renderControl);
el("f-clear").onclick = () => { el("f-table").value=""; el("f-branch").value=""; el("f-status").value=""; renderControl(); };
load();
</script>
{% endblock %}
