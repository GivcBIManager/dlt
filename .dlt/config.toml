# dlt pipeline configuration

[runtime]
log_level = "INFO"

# Filesystem destination configuration for local Iceberg storage.
# A scheme-less / relative path is resolved against the repo root and converted
# to a file:// URI per-OS (see etl/config.resolve_bucket_url), so the SAME value
# works on Windows and Linux. Override at runtime with $OASIS_BUCKET_URL, or set
# an explicit URL here (e.g. file:///abs/path, s3://bucket/prefix).
[destination.filesystem]
bucket_url = "iceberg_output"

# Iceberg table format settings
[destination.filesystem.kwargs]
table_format = "iceberg"

# --------------------------------------------------------------------------- #
# dlt-native load/normalize tuning (NOT [etl] -- these configure dlt's own
# stages, which is the only part of dlt this pipeline uses: extraction is custom
# oracledb->parquet, so dlt's [extract] knobs do not apply here).
#
# Memory note: the load-side peak is dlt calling arrow_dataset.to_table() over a
# whole load package (filesystem.py). We bound it primarily by writing one branch
# per dlt run in iceberg_load.py; the settings below bound the normalize side and
# keep parquet files (hence each run's to_table()) small.
# --------------------------------------------------------------------------- #
[normalize]
# We load tables serially (single load executor), so a normalize process pool
# only adds memory/spawn overhead without speeding anything up. Keep it at 1.
workers = 1

[normalize.data_writer]
buffer_max_items = 10000     # rows held in RAM before flushing to parquet (default 5000)
file_max_items   = 200000    # rotate parquet files; caps rows the loader reads back per file
row_group_size   = 100000    # smaller row groups -> lower peak when files are read back to Arrow

[load]
# Free the dlt working dir (completed load packages) after each table. This
# pipeline runs many tables x many runs, so packages would otherwise accumulate.
delete_completed_jobs = true

# ETL pipeline tuning (all optional; CLI flags override these).
# See oracle_to_iceberg.py --help. Defaults shown.
[etl]
dataset_name        = "oasis"
pipeline_name       = "oracle_to_iceberg"

# concurrency: outer pool over branches, inner pool over tables per branch.
# Lowered from 7 to cap simultaneous Oracle cursors (each holds a fetch buffer):
# extraction peak RSS scales with (branch_workers x table_workers x fetch_batch_size).
max_branch_workers  = 7
max_table_workers   = 2

# Oracle connection pool (per branch)
pool_min            = 1
pool_max            = 7
pool_increment      = 1
pool_acquire_timeout_s = 30
pool_acquire_attempts  = 5

# connection-failure retry policy: 5 retries, 5 minutes apart
max_retries         = 5
retry_interval_s    = 300

# fetch_batch_size is configured per branch in .dlt/secrets.toml
# ([oracle_branches.<key>].fetch_batch_size); branches that omit it fall back to
# the DEFAULT_FETCH_BATCH_SIZE built into etl/config.py.
dsn_mode            = "service_name"   # or "sid"

# DQ hash-delta tolerance: a (table, branch) whose row-hash drift is within this
# percent of its Oracle hashed rows is reported WITHIN_TOLERANCE instead of
# MISMATCH. Row-count drift is always a hard MISMATCH. (0 = strict / no tolerance.)
dq_hash_delta_tolerance_pct = 10.0

# Iceberg snapshot retention: keep only this many days of snapshots; older ones
# are expired after each load (min_to_keep guarantees the current snapshot).
snapshot_maintenance = true
snapshot_expire_days = 2
snapshot_min_to_keep = 1

# Oracle 11g REQUIRES thick mode (python-oracledb thin needs 12.1+).
thick_mode          = true
# Path to the Oracle Instant Client libs for thick mode. This is host- and
# OS-specific. The pipeline IGNORES this value if the directory does not exist
# on the current machine and falls back to the system loader path (PATH on
# Windows, LD_LIBRARY_PATH on Linux), so the same config.toml is safe on both.
# Override per-host with $ORACLE_CLIENT_LIB_DIR.
#   Linux example:   "/opt/oracle/instantclient_19_24"
#   Windows example: "C:\\oracle\\instantclient_19_24"
oracle_client_lib_dir = "D:\\Readmission\\instantclient\\instantclient_19_24"

# --------------------------------------------------------------------------- #
# dbt-core materialization layer (Iceberg -> ClickHouse). ClickHouse connection
# creds live in .dlt/secrets.toml [clickhouse]; the app GENERATES dbt/profiles.yml
# from these two blocks. ClickHouse is an external prerequisite (24.x+).
# --------------------------------------------------------------------------- #
[dbt]
project_dir             = "dbt"     # dbt project dir, relative to repo root
target                  = "dev"     # dbt target (matches the generated profile)
threads                 = 4         # dbt threads
default_materialization = "table"   # materialize Iceberg into native CH tables
dbt_executable          = "dbt"     # dbt entry point (usually on the venv PATH)
